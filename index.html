<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="UPT Probolinggo">
<link rel="apple-touch-icon" href="icon.png">
<title>UPT Probolinggo — Jadwal Vendor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#F0F4FF}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.topbar{background:#1A1A2E;padding:14px 16px;padding-top:max(14px,env(safe-area-inset-top));position:fixed;top:0;left:0;right:0;z-index:200}
.topbar h1{color:#fff;font-size:15px;font-weight:600}
.topbar p{color:rgba(255,255,255,0.5);font-size:11px;margin-top:3px}
.sticky-area{position:fixed;left:0;right:0;z-index:50;background:#fff}
.scroll-area{position:fixed;left:0;right:0;bottom:62px;overflow-y:auto;background:#F0F4FF}
.content{padding:12px;min-height:100%}
.panel{display:none}
.panel.active{display:block}
.month-bar{background:#fff;border-bottom:1px solid #E8EEF8;padding:10px 12px;display:flex;align-items:center;gap:10px}
.month-bar label{font-size:12px;font-weight:500;color:#555;white-space:nowrap}
.month-select{flex:1;font-size:13px;font-weight:500;color:#1565C0;border:1.5px solid #90CAF9;border-radius:8px;padding:7px 10px;background:#EEF4FF;appearance:none;-webkit-appearance:none;outline:none}
.month-count{font-size:11px;color:#90A4AE;white-space:nowrap}

/* BOTTOM NAV — putih bersih, garis tipis saja */
.bottomnav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:#fff;display:flex;border-top:1px solid #E0E0E0;padding-bottom:max(0px,env(safe-area-inset-bottom))}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px;cursor:pointer;transition:all 0.15s;color:#999;font-size:12px;font-weight:500;white-space:nowrap;border-top:3px solid transparent;margin-top:-1px}
.tab.active{color:#1565C0;border-top:3px solid #1565C0;background:#EEF4FF}
.cnt{display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border-radius:20px;padding:1px 6px;margin-left:4px;vertical-align:middle}
.tab:not(.active) .cnt{background:#E0E0E0;color:#888}
.tab.active .cnt{background:#1565C0;color:#fff}

.card{background:#fff;border:0.5px solid #DDEEFF;border-radius:12px;padding:12px 14px;margin-bottom:8px}
.card.highlight{background:#E6F7F5;border:1.5px solid #4DB6AC}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.aset{font-size:13px;font-weight:600;color:#1A1A2E;flex:1;line-height:1.3}
.teg{font-size:11px;font-weight:500;padding:3px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.teg-500{background:#FEF3C7;color:#92400E}
.teg-150{background:#EDE9FE;color:#5B21B6}
.teg-20{background:#D1FAE5;color:#065F46}
.uraian{font-size:12px;color:#555;line-height:1.5;margin-bottom:10px}
.meta{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.mi{background:#F4F8FF;border-radius:8px;padding:6px 8px}
.card.highlight .mi{background:#C8EFEC}
.ml{font-size:10px;color:#90A4AE;margin-bottom:1px}
.mv{font-size:12px;font-weight:500;color:#1A1A2E}
.ultg{display:inline-flex;font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;margin-top:8px}
.u-p{background:#FEE2E2;color:#991B1B}
.u-b{background:#DBEAFE;color:#1E40AF}
.u-j{background:#D1FAE5;color:#065F46}
.pj-badge{display:inline-flex;font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;margin-top:8px;margin-left:6px}
.pj-luar{background:#FEF3C7;color:#92400E}
.pj-upt{background:#F0F4FF;color:#1565C0}
.pj-other{background:#F3F4F6;color:#555}
.today-badge{display:inline-flex;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;margin-top:8px;margin-left:6px;background:#00897B;color:#fff}

/* Section divider */
.sec-divider{display:flex;align-items:center;gap:10px;margin:16px 0 10px}
.sec-divider-line{flex:1;height:1px;background:#E0E0E0}
.sec-divider-label{font-size:11px;font-weight:600;color:#888;white-space:nowrap;text-transform:uppercase;letter-spacing:0.5px}
.sec-divider.teal .sec-divider-label{color:#00897B}
.sec-divider.teal .sec-divider-line{background:#B2DFDB}
.sec-divider.gray .sec-divider-label{color:#999}

.empty{text-align:center;padding:32px 20px;color:#aaa;font-size:13px;font-style:italic;background:#fff;border-radius:12px;border:0.5px solid #DDEEFF}
.loading{text-align:center;padding:40px 20px;color:#90A4AE;font-size:13px}
.loading::after{content:'';display:block;width:24px;height:24px;border:2px solid #DDEEFF;border-top-color:#1565C0;border-radius:50%;margin:12px auto 0;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err{text-align:center;padding:24px;color:#c0392b;font-size:12px;background:#fff;border-radius:12px;border:0.5px solid #FFCDD2;line-height:1.6}
.retry-btn{display:inline-block;margin-top:10px;padding:8px 20px;background:#1565C0;color:#fff;border:none;border-radius:20px;font-size:12px;cursor:pointer}

.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;display:flex;align-items:flex-end;justify-content:center}
.popup-wrap{width:100%;position:relative}
.popup-close{position:absolute;top:-18px;right:12px;background:#fff;border:none;border-radius:50%;width:32px;height:32px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#555;box-shadow:0 1px 4px rgba(0,0,0,0.2);z-index:10}
.popup-box{background:#fff;border-radius:16px 16px 0 0;padding:16px 16px 24px;width:100%;max-height:65vh;overflow-y:auto}
.popup-title{font-size:13px;font-weight:600;color:#1A1A2E;margin-bottom:10px;padding-right:8px}
.popup-body{font-size:12px;color:#444;line-height:1.7}
.popup-body p{margin-bottom:6px}
.btn-mitigasi{background:none;border:1px solid #BBDEFB;border-radius:50%;color:#1565C0;font-size:11px;font-weight:700;width:22px;height:22px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;float:right}
.btn-mitigasi.empty{border-color:#E0E0E0;color:#BBBBBB;cursor:default}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px;flex-wrap:wrap;gap:6px}
.card-footer-left{display:flex;align-items:center;flex-wrap:wrap;gap:6px}

.filter-bar{background:#fff;border-bottom:1px solid #E8EEF8;padding:10px 12px;display:flex;align-items:center;gap:8px;flex-wrap:nowrap;overflow-x:auto}
.filter-select,.filter-date{font-size:12px;font-weight:500;color:#1565C0;border:1.5px solid #90CAF9;border-radius:8px;padding:0 8px;background:#EEF4FF;appearance:none;-webkit-appearance:none;outline:none;min-width:0;flex:1;height:34px;cursor:pointer}
.filter-select.active,.filter-date.active{background:#1565C0;color:#fff;border-color:#1565C0}
.filter-date::-webkit-datetime-edit{color:#1565C0}
.filter-date::-webkit-datetime-edit-fields-wrapper{background:transparent}
.filter-date.active::-webkit-datetime-edit{color:#fff}
.filter-date::-webkit-calendar-picker-indicator{cursor:pointer;opacity:0.6}
.filter-date.active::-webkit-calendar-picker-indicator{filter:invert(1)}
.filter-date:not(.active)::-webkit-datetime-edit-year-field,
.filter-date:not(.active)::-webkit-datetime-edit-month-field,
.filter-date:not(.active)::-webkit-datetime-edit-day-field,
.filter-date:not(.active)::-webkit-datetime-edit-text{color:transparent}
.filter-date.empty-label{color:#1565C0;font-size:12px}
.date-placeholder{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:12px;font-weight:500;color:#1565C0;pointer-events:none;white-space:nowrap}
.filter-date.active+.date-placeholder,.filter-date[data-has-value="1"]+.date-placeholder{display:none}
.filter-clear{font-size:12px;font-weight:600;color:#fff;background:#E53935;border:none;border-radius:8px;padding:6px 10px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.filter-clear:disabled{background:#E0E0E0;color:#aaa;cursor:default}
.fab-up{position:fixed;bottom:72px;right:12px;width:30px;height:30px;background:#1565C0;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:199;opacity:0;transition:opacity 0.25s;box-shadow:0 2px 6px rgba(21,101,192,0.4)}
.fab-up.visible{opacity:1}
.fab-up svg{width:14px;height:14px;fill:#fff}
</style>
</head>
<body>
<div class="topbar">
  <h1>UPT Probolinggo</h1>
  <p id="tgl"></p>
</div>
<div class="sticky-area" id="stickyArea">
  <!-- ROM Final sticky bars -->
  <div id="romStickyBars" style="display:none">
    <div class="filter-bar">
      <select class="filter-select" id="romFilterUltg" onchange="applyRomFilter()">
        <option value="">Semua ULTG</option>
        <option value="PROBOLINGGO">Probolinggo</option>
        <option value="BANGIL">Bangil</option>
        <option value="JEMBER">Jember</option>
      </select>
      <div style="flex:1;min-width:0;position:relative"><input type="date" class="filter-date" id="romFilterDate" onchange="applyRomFilter()" style="width:100%"><span class="date-placeholder" id="romDatePlaceholder">Pilih Tanggal</span></div>
      <button class="filter-clear" id="romClearBtn" onclick="clearRomFilter()" disabled>Hapus</button>
    </div>
  </div>
  <!-- ROB sticky bars -->
  <div id="robStickyBars" style="display:none">
    <div class="month-bar">
      <label>Bulan</label>
      <select class="month-select" id="monthSelect" onchange="loadMonth()">
        <option value="1">Januari 2026</option>
        <option value="2">Februari 2026</option>
        <option value="3">Maret 2026</option>
        <option value="4">April 2026</option>
        <option value="5">Mei 2026</option>
        <option value="6" selected>Juni 2026</option>
      </select>
      <span class="month-count" id="monthCount"></span>
    </div>
    <div class="filter-bar">
      <select class="filter-select" id="robFilterUltg" onchange="applyRobFilter()">
        <option value="">Semua ULTG</option>
        <option value="PROBOLINGGO">Probolinggo</option>
        <option value="BANGIL">Bangil</option>
        <option value="JEMBER">Jember</option>
      </select>
      <div style="flex:1;min-width:0;position:relative"><input type="date" class="filter-date" id="robFilterDate" onchange="applyRobFilter()" style="width:100%"><span class="date-placeholder" id="robDatePlaceholder">Pilih Tanggal</span></div>
      <button class="filter-clear" id="robClearBtn" onclick="clearRobFilter()" disabled>Hapus</button>
    </div>
  </div>
</div>
<div class="scroll-area" id="scrollWrap">
  <div class="content">
    <div class="panel active" id="p0"><div class="loading">Memuat data</div></div>
    <div class="panel" id="p1"><div class="loading">Memuat data</div></div>
    <div class="panel" id="p2"><div id="romContent"><div class="loading">Memuat data</div></div></div>
    <div class="panel" id="p3">
      <div style="padding:12px 0 0" id="monthContent"><div class="loading">Memuat data</div></div>
    </div>
  </div>
</div>
<nav class="bottomnav">
  <div class="tab active" onclick="sw(0)">Hari Ini<span class="cnt" id="c0">...</span></div>
  <div class="tab" onclick="sw(1)">Besok<span class="cnt" id="c1">...</span></div>
  <div class="tab" onclick="sw(2)">ROM Final<span class="cnt" id="c2">...</span></div>
  <div class="tab" onclick="sw(3)">ROB<span class="cnt" id="c3">...</span></div>
</nav>
<button class="fab-up" id="fabUp" onclick="document.getElementById('scrollWrap').scrollTo({top:0,behavior:'smooth'})">
  <svg viewBox="0 0 24 24"><path d="M12 4l-8 8h5v8h6v-8h5z"/></svg>
</button>
<script>
const DAYS=['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
const MONTHS_ID=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
const MN={Januari:0,Februari:1,Maret:2,April:3,Mei:4,Juni:5,Juli:6,Agustus:7,September:8,Oktober:9,November:10,Desember:11};
const NOW=new Date();

// Set posisi scroll-wrap tepat di bawah header
function fixLayout(){
  const topH=document.querySelector('.topbar').offsetHeight;
  const sa=document.getElementById('stickyArea');
  const sw=document.getElementById('scrollWrap');
  sa.style.top=topH+'px';
  const saH=sa.offsetHeight;
  sw.style.top=(topH+saH)+'px';
}
fixLayout();
window.addEventListener('resize', fixLayout);

const TODAY=new Date(NOW.getFullYear(),NOW.getMonth(),NOW.getDate());
const TOMORROW=new Date(TODAY); TOMORROW.setDate(TODAY.getDate()+1);
document.getElementById('tgl').textContent='Jadwal Vendor · Hari ini: '+DAYS[TODAY.getDay()]+', '+TODAY.getDate()+' '+MONTHS_ID[TODAY.getMonth()]+' '+TODAY.getFullYear();
const sel=document.getElementById('monthSelect');
const defaultMonth=Math.min(NOW.getMonth()+2,5);
if(sel.querySelector(`option[value="${defaultMonth}"]`)) sel.value=defaultMonth;
const BASE='https://docs.google.com/spreadsheets/d/e/2PACX-1vQQML2dVfvtdjphB4a55qpbeq6BQH85qgKn-XRbar0zp8CTqWKU1xwsdj77Xf2LiugnSquQKaKGD57U/pub';
const URLS={
  hari:BASE+'?gid=1523652542&single=true&output=csv',
  rom: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQQML2dVfvtdjphB4a55qpbeq6BQH85qgKn-XRbar0zp8CTqWKU1xwsdj77Xf2LiugnSquQKaKGD57U/pub?gid=292413586&single=true&output=csv',
  1:BASE+'?gid=1965474605&single=true&output=csv',
  2:BASE+'?gid=1435750602&single=true&output=csv',
  3:BASE+'?gid=1823378795&single=true&output=csv',
  4:BASE+'?gid=1580327448&single=true&output=csv',
  5:BASE+'?gid=283699977&single=true&output=csv',
  6:BASE+'?gid=2058835488&single=true&output=csv',
};
function parseCSV(text){
  const rows=[];const lines=text.split('\n');let i=0;
  while(i<lines.length){
    const cols=[];let cur='',inQ=false,line=lines[i];
    outer:while(true){
      for(let j=0;j<line.length;j++){
        const ch=line[j];
        if(ch==='"'){if(inQ&&line[j+1]==='"'){cur+='"';j++;}else inQ=!inQ;}
        else if(ch===','&&!inQ){cols.push(cur.trim());cur='';}
        else cur+=ch;
      }
      if(!inQ)break;
      i++;if(i>=lines.length)break;cur+=' ';line=lines[i];
    }
    cols.push(cur.trim());rows.push(cols);i++;
  }
  return rows;
}
function parseDate(s){
  if(!s) return null;
  const p=s.replace(/^[^,]+,\s*/,'').trim().split(' ');
  if(p.length<3) return null;
  const m=MN[p[1]];
  if(m===undefined) return null;
  return new Date(parseInt(p[2]),m,parseInt(p[0]));
}
function isActive(awal,akhir,target){
  const d1=parseDate(awal),d2=parseDate(akhir);
  if(!d1||!d2) return false;
  return d1<=target&&d2>=target;
}
function isTodayStart(awal){
  const d1=parseDate(awal);
  if(!d1) return false;
  return d1.getTime()===TODAY.getTime();
}
function tegClass(t){const n=parseInt(t);return n>=500?'teg-500':n>=150?'teg-150':'teg-20';}
function ultgClass(u){
  if(!u) return 'u-p';
  u=u.toUpperCase();
  return u.includes('PROBOLINGGO')?'u-p':u.includes('BANGIL')?'u-b':'u-j';
}
function pjClass(p){
  if(!p) return 'pj-other';
  p=p.toUpperCase();
  if(p.includes('PIHAK LUAR')) return 'pj-luar';
  if(p.includes('UPT')||p.includes('UP2')) return 'pj-upt';
  return 'pj-other';
}
function divider(label, style){
  return`<div class="sec-divider ${style}"><div class="sec-divider-line"></div><div class="sec-divider-label">${label}</div><div class="sec-divider-line"></div></div>`;
}
function cardHTML(r,hl,showPj){
  const awal=r[4]||'',akhir=r[5]||'';
  const badge=hl?'<span class="today-badge">Berlangsung Hari Ini</span>':'';
  return`<div class="card${hl?' highlight':''}">
    <div class="card-top"><div class="aset">${r[0]||''}</div><span class="teg ${tegClass(r[2])}">${r[2]||''} kV</span></div>
    <div class="uraian">${r[1]||''}</div>
    <div class="meta">
      <div class="mi"><div class="ml">Peralatan Padam</div><div class="mv">${r[3]||''}</div></div>
      <div class="mi"><div class="ml">Pukul</div><div class="mv">${r[6]||''}</div></div>
      <div class="mi"><div class="ml">Tgl Mulai</div><div class="mv">${awal.replace(/^[^,]+,\s*/,'')}</div></div>
      <div class="mi"><div class="ml">Tgl Selesai</div><div class="mv">${akhir.replace(/^[^,]+,\s*/,'')}</div></div>
    </div>
    <div class="card-footer">
      <div class="card-footer-left">
        <span class="ultg ${ultgClass(r[8])}">${r[8]||'—'}</span>
        ${badge}
      </div>
      <button class="btn-mitigasi${r[7]?'':' empty'}" onclick="${r[7]?`showMitigasi('${esc(r[0])}','${esc(r[7])}')`:''}" ${r[7]?'':'disabled'}>?</button>
    </div>
  </div>`;
}
function esc(s){return (s||'').replace(/'/g,"\\'")}
function cardHTMLRom(r,hl){
  const awal=r[7]||'',akhir=r[8]||'';
  const pj=r[6]||'';
  const mitigasi=r[11]||'';
  const badge=hl?'<span class="today-badge">Berlangsung Hari Ini</span>':'';
  return`<div class="card${hl?' highlight':''}">
    <div class="card-top"><div class="aset">${r[1]||''}</div><span class="teg ${tegClass(r[3])}">${r[3]||''} kV</span></div>
    <div class="uraian">${r[2]||''}</div>
    <div class="meta">
      <div class="mi"><div class="ml">Peralatan Padam</div><div class="mv">${r[4]||''}</div></div>
      <div class="mi"><div class="ml">Pukul</div><div class="mv">${r[9]||''}</div></div>
      <div class="mi"><div class="ml">Tgl Mulai</div><div class="mv">${awal.replace(/^[^,]+,\s*/,'')}</div></div>
      <div class="mi"><div class="ml">Tgl Selesai</div><div class="mv">${akhir.replace(/^[^,]+,\s*/,'')}</div></div>
    </div>
    <div class="card-footer">
      <div class="card-footer-left">
        <span class="ultg ${ultgClass(r[13])}">${r[13]||'—'}</span>
        ${pj?`<span class="pj-badge ${pjClass(pj)}">${pj}</span>`:''}
        ${badge}
      </div>
      <button class="btn-mitigasi${mitigasi?'':' empty'}" onclick="${mitigasi?`showMitigasi('${esc(r[1])}','${esc(mitigasi)}')`:''}" ${mitigasi?'':'disabled'}>?</button>
    </div>
  </div>`;
}
let romAllRows=[];

function renderRomPanel(rows){
  romAllRows=rows;
  applyRomFilter();
}

function applyRomFilter(){
  const ultg=document.getElementById('romFilterUltg').value;
  const dateVal=document.getElementById('romFilterDate').value;
  const clearBtn=document.getElementById('romClearBtn');

  let filtered=romAllRows;
  if(ultg) filtered=filtered.filter(r=>(r[13]||'').toUpperCase().includes(ultg));
  if(dateVal){
    // dateVal = "2026-04-17", konversi ke object Date
    const [y,m,d]=dateVal.split('-');
    const target=new Date(parseInt(y),parseInt(m)-1,parseInt(d));
    filtered=filtered.filter(r=>{
      const d1=parseDate(r[7]);
      return d1&&d1.getTime()===target.getTime();
    });
  }

  const hasFilter=ultg||dateVal;
  clearBtn.disabled=!hasFilter;
  document.getElementById('romFilterUltg').classList.toggle('active',!!ultg);
  const romDate=document.getElementById('romFilterDate');
  if(romDate){
    romDate.classList.toggle('active',!!dateVal);
    romDate.setAttribute('data-has-value', dateVal?'1':'');
    const rp=document.getElementById('romDatePlaceholder'); if(rp) rp.style.display=dateVal?'none':'';
  }

  const content=document.getElementById('romContent');
  document.getElementById('c2').textContent=filtered.length;

  if(!filtered.length){
    content.innerHTML='<div class="empty" style="margin:12px">Tidak ada data sesuai filter</div>';
    return;
  }

  const luar=filtered.filter(r=>(r[6]||'').toUpperCase().includes('PIHAK LUAR'));
  const bukan=filtered.filter(r=>!(r[6]||'').toUpperCase().includes('PIHAK LUAR'));
  const luarHl=luar.filter(r=>isActive(r[7],r[8],TODAY));
  const luarRest=luar.filter(r=>!isActive(r[7],r[8],TODAY));
  let html='<div style="padding:12px 12px 0">';
  if(luar.length){
    html+=divider(`Pihak Luar (${luar.length})`,'teal');
    if(luarHl.length) html+=luarHl.map(r=>cardHTMLRom(r,true)).join('');
    html+=luarRest.map(r=>cardHTMLRom(r,false)).join('');
  }
  if(bukan.length){
    html+=divider(`Lainnya (${bukan.length})`,'gray');
    html+=bukan.map(r=>cardHTMLRom(r,false)).join('');
  }
  html+='</div>';
  content.innerHTML=html;
}

function clearRomFilter(){
  document.getElementById('romFilterUltg').value='';
  document.getElementById('romFilterDate').value='';
  applyRomFilter();
}
function renderPanel(id,rows,emptyMsg,cntId){
  document.getElementById(cntId).textContent=rows.length;
  if(!rows.length){document.getElementById(id).innerHTML=`<div class="empty">${emptyMsg}</div>`;return;}
  document.getElementById(id).innerHTML=rows.map(r=>cardHTML(r,false,false)).join('');
}
async function fetchCSV(url){
  const res=await fetch(url);
  if(!res.ok) throw new Error('HTTP '+res.status);
  return parseCSV(await res.text());
}
const monthCache={};
async function loadMonth(){
  const month=document.getElementById('monthSelect').value;
  const content=document.getElementById('monthContent');
  const countEl=document.getElementById('monthCount');
  // Reset filter saat ganti bulan
  document.getElementById('robFilterUltg').value='';
  document.getElementById('robFilterDate').value='';
  document.getElementById('robClearBtn').disabled=true;
  robAllRows=[];
  if(monthCache[month]){renderMonthData(monthCache[month],countEl,content);return;}
  content.innerHTML='<div class="loading">Memuat data</div>';
  countEl.textContent='';
  try{
    const data=await fetchCSV(URLS[month]);
    const rows=data.slice(4).filter(r=>r[0]&&/^\d+$/.test(r[0].trim())&&r[1]&&r[1].trim()!='');
    monthCache[month]=rows;
    renderMonthData(rows,countEl,content);
  }catch(e){
    content.innerHTML=`<div class="err">Gagal memuat data.<br><small>${e.message}</small><br><button class="retry-btn" onclick="loadMonth()">Coba Lagi</button></div>`;
  }
}
let robAllRows=[];

function renderMonthData(rows,countEl,content){
  robAllRows=rows;
  countEl.textContent=rows.length+' pekerjaan';
  document.getElementById('c3').textContent=rows.length;
  applyRobFilter();
}

function applyRobFilter(){
  if(!robAllRows.length) return;
  const ultg=document.getElementById('robFilterUltg').value;
  const dateVal=document.getElementById('robFilterDate').value;
  const clearBtn=document.getElementById('robClearBtn');

  let filtered=robAllRows;
  if(ultg) filtered=filtered.filter(r=>(r[13]||'').toUpperCase().includes(ultg));
  if(dateVal){
    const [y,m,d]=dateVal.split('-');
    const target=new Date(parseInt(y),parseInt(m)-1,parseInt(d));
    filtered=filtered.filter(r=>{
      const d1=parseDate(r[7]);
      return d1&&d1.getTime()===target.getTime();
    });
  }

  const hasFilter=ultg||dateVal;
  clearBtn.disabled=!hasFilter;
  document.getElementById('robFilterUltg').classList.toggle('active',!!ultg);
  const robDate=document.getElementById('robFilterDate');
  if(robDate){
    robDate.classList.toggle('active',!!dateVal);
    robDate.setAttribute('data-has-value', dateVal?'1':'');
    const rbp=document.getElementById('robDatePlaceholder'); if(rbp) rbp.style.display=dateVal?'none':'';
  }

  document.getElementById('c3').textContent=filtered.length;
  const content=document.getElementById('monthContent');
  if(!filtered.length){
    content.innerHTML='<div class="empty" style="margin-top:12px">Tidak ada data sesuai filter</div>';
    return;
  }
  content.innerHTML=filtered.map(r=>cardHTMLRom(r,false)).join('');
}

function clearRobFilter(){
  document.getElementById('robFilterUltg').value='';
  document.getElementById('robFilterDate').value='';
  applyRobFilter();
}
async function loadAll(){
  try{
    const [hariData,romData]=await Promise.all([fetchCSV(URLS.hari),fetchCSV(URLS.rom)]);
    const allHari=hariData.slice(6).filter(r=>r[0]&&r[0].trim()!='');
    renderPanel('p0',allHari.filter(r=>isActive(r[4],r[5],TODAY)),'Tidak ada pekerjaan hari ini','c0');
    renderPanel('p1',allHari.filter(r=>isActive(r[4],r[5],TOMORROW)),'Tidak ada pekerjaan besok','c1');
    const romRows=romData.slice(4).filter(r=>r[0]&&/^\d+$/.test(r[0].trim())&&r[1]&&r[1].trim()!='');
    renderRomPanel(romRows);
  }catch(e){
    ['p0','p1','p2'].forEach(id=>{document.getElementById(id).innerHTML=`<div class="err">Gagal memuat data.<br><small>${e.message}</small><br><button class="retry-btn" onclick="location.reload()">Coba Lagi</button></div>`;});
    ['c0','c1','c2'].forEach(id=>document.getElementById(id).textContent='!');
  }
  loadMonth();
}

function showMitigasi(aset, mitigasi){
  document.getElementById('mitigasiTitle').textContent='Mitigasi Sistem — '+aset;
  const body=document.getElementById('mitigasiBody');
  if(!mitigasi){body.innerHTML='<p>Tidak ada informasi mitigasi.</p>';return;}
  // Pecah berdasarkan pola: bullet •, huruf a. b. c., atau newline
  const lines=mitigasi
    .replace(/•/g,'\n•')
    .replace(/([a-z])\.\s/gi,'\n$1. ')
    .replace(/([A-Z][A-Z\s]+)\s:/g,'\n$1 :')
    .split('\n')
    .map(s=>s.trim())
    .filter(s=>s.length>0);
  body.innerHTML=lines.map(l=>`<p>${l}</p>`).join('');
  document.getElementById('mitigasiOverlay').style.display='flex';
}
function closeMitigasi(){
  document.getElementById('mitigasiOverlay').style.display='none';
}
function sw(i){
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',i==j));
  document.querySelectorAll('.panel').forEach((p,j)=>p.classList.toggle('active',i==j));
  document.getElementById('romStickyBars').style.display=i===2?'block':'none';
  document.getElementById('robStickyBars').style.display=i===3?'block':'none';
  document.getElementById('scrollWrap').scrollTo({top:0,behavior:'smooth'});
  setTimeout(fixLayout, 10);
}
document.getElementById('scrollWrap').addEventListener('scroll',function(){
  document.getElementById('fabUp').classList.toggle('visible',this.scrollTop>200);
});
loadAll();
</script>

<div class="popup-overlay" id="mitigasiOverlay" style="display:none" onclick="if(event.target===this)closeMitigasi()">
  <div class="popup-wrap">
    <button class="popup-close" onclick="closeMitigasi()">✕</button>
    <div class="popup-box">
      <div class="popup-title" id="mitigasiTitle"></div>
      <div class="popup-body" id="mitigasiBody"></div>
    </div>
  </div>
</div>
